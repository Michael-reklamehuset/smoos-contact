<!DOCTYPE html>
<html lang="en" style="background-color: rgb(255, 255, 255);">

<head>

  <meta name="robots" content="noindex, nofollow">
  <script>
    "http" == window.location.href.substr(0, 4) && "/" != window.location.href.slice(-1) && window.location.replace(window.location.href + "/");

  <title>Simon Moos contacts</title>
  <link rel="apple-touch-icon" sizes="57x57" href="/fav/apple-icon-57x57.png">
  <link rel="apple-touch-icon" sizes="60x60" href="/fav/apple-icon-60x60.png">
  <link rel="apple-touch-icon" sizes="72x72" href="/fav/apple-icon-72x72.png">
  <link rel="apple-touch-icon" sizes="76x76" href="/fav/apple-icon-76x76.png">
  <link rel="apple-touch-icon" sizes="114x114" href="/fav/apple-icon-114x114.png">
  <link rel="apple-touch-icon" sizes="120x120" href="/fav/apple-icon-120x120.png">
  <link rel="apple-touch-icon" sizes="144x144" href="/fav/apple-icon-144x144.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/fav/apple-icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/fav/apple-icon-180x180.png">

  <style>
    #body {
      font-family: sans-serif;
    }

    input[type='range']::-moz-range-track {
      background: none;
    }

    input[type='range']::-moz-range-thumb {
      -moz-appearance: none;
      width: 1.5rem;
      height: 1.5rem;
      border-radius: 100%;
      border: none;
      background: #059669;
      z-index: 3;
      cursor: pointer;
    }

    input[type='range']::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 1.5rem;
      height: 1.5rem;
      border-radius: 100%;
      border: none;
      background: #059669;
      z-index: 3;
      cursor: pointer;
    }

    .closeColor {
      filter: invert(1)
    }

    .topAction {
      filter: invert(1)
    }

    .iconColor {
      color: #eee;
    }

    .cardColor {
      color: #222 !important
    }

    .textColor {
      color: #222 !important
    }

    .seekbarColor {
      background: #05966980 !important
    }
  </style>
  <link rel="stylesheet" href="style.min.css">
</head>

<body id="body">
  <header>
    <img src="logo.png" id="headerlogo" alt="Simon Moos Logo">

  </header>
  <main style="background-color: rgb(255, 255, 255); margin-top: 0px;">
    <div id="info" class="textColor">
      <p class="name">
        Contacts
      </p>
      <div class"contacts">
		  <p><a href="erich/">Erich</a></p>
		  <p><a href="jens/">Jens</a></p>
		  <p><a href="mateusz/">Mateusz</a></p>
		  <p><a href="nic-tony/">Nic-tony</a></p>
		  <p><a href="per/">Per</a></p>
		  <p><a href="stefan/">Stefan</a></p>
      </div>
    </div>
  </main>

</body>

</html>
